<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Creative Explorer</p>
          <p class="hero-text">
            Discover visual inspiration with a cleaner, bolder image search
            experience powered by Unsplash.
          </p>
        </div>
        <div class="hero-panel">
          <p>Popular ideas</p>
          <div class="tag-list">
            <button type="button" class="tag-button">Mountains</button>
            <button type="button" class="tag-button">Street Style</button>
            <button type="button" class="tag-button">Ocean</button>
            <button type="button" class="tag-button">Architecture</button>
          </div>
        </div>
      </header>

      <main class="content-shell">
        <form class="search-form">
          <label class="sr-only" for="search-input">Search for images</label>
          <input
            type="text"
            id="search-input"
            placeholder="Search for images, moods, places..."
          />
          <button id="search-button" type="submit">Search</button>
        </form>

        <div class="results-shell is-hidden" id="results-shell">
          <div class="results-toolbar">
          <p id="status-text">Try searching for landscapes, food, travel, or fashion.</p>
          </div>

          <div class="search-results"></div>

          <button id="show-more-button" type="button">Show more</button>
        </div>
      </main>
    </div>

    <script src="index.js"></script>
  </body>
</html>
